<!doctype html>
<html>
  <head>
    <title>Annapurna Hub</title>
    <link rel="stylesheet" href="./../css/contact.css" />
  </head>
  <body>
    <div>
      <div class="navbar"></div>
      <!-- Hero section -->
      <div class="main-head-section">
        <span class="main-heading-info">Get In Touch</span>
        <p class="main-heading-info-para">
          We are here to hear you! Whether you have a question about services,
          pricing, or anything else, our team is ready to answer all your
          questions.
        </p>
        <div class="facility-section">
            <div class="facility-section-item"><img src="" alt="order-icon" height="16px"/> Place Order</div>
            <div class="facility-section-item"><img src="" alt="message-icon" height="16px"/>Send message</div>
            <div class="facility-section-item"><img src="" alt="location-icon" height="16px"/>Location</div>
            
        </div>
      </div>
      <hr />
      <!-- Location -->
       
      <hr />
      <!-- Send a message -->
      <div class="message-container">
        <span class="message-heading">Send us a Message</span>
        <div class="message-section">
          <form>
            <label for="username" class="label-text">Full Name</label><br />
            <input
              type="text"
              id="username"
              placeholder="Enter your name"
              class="enter-text"
            /><br />
            <label for="useremail" class="label-text">Email Address</label
            ><br />
            <input
              type="email"
              id="useremail"
              placeholder="Enter your email"
              class="enter-text"
            /><br />
            <label for="userphone" class="label-text">Phone Number</label><br />
            <input
              type="tel"
              id="userphone"
              placeholder="Enter your phone number"
              class="enter-text"
            /><br />
            <div>
              <span>General Inquiry</span>
              <span>Support</span>
              <span>Bussiness Collaboration</span>
              <span>Feedback</span>
            </div>
            <br />
            <label for="usermessage" class="label-text">Message us</label><br />
            <textarea
              id="usermessage"
              class="enter-text"
              placeholder="Write your message here......."
            ></textarea
            ><br />
            <button class="message-btn">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
